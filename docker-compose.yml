
services:
  # https://github.com/cloudflare/cloudflared/releases
  dns-proxy:
    image: local-dns-crypt-proxy:${DNSCRYPT_VER}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DNSCRYPT_VER: ${DNSCRYPT_VER}
    container_name: dnscryptproxy
    command: ["/usr/local/bin/dnscrypt-proxy/linux-arm64/dnscrypt-proxy", "-config", "/dnscrypt-proxy.toml"]
    environment:
      TZ: Europe/Berlin
    volumes:
      - ./dnscrypt-proxy.toml:/dnscrypt-proxy.toml:ro
    ports:
      - ${HOST_IP}:${DNSCRYPT_UI_PORT}:8080/tcp
#      - ${HOST_IP}:53:53/udp
#      - ${HOST_IP}:53:53/tcp
    restart: unless-stopped
  # https://github.com/pi-hole/docker-pi-hole/releases
  pihole:
    container_name: phl
    image: pihole/pihole:${PI_HOLE_VERSION}
    restart: unless-stopped
    ports:
      - ${HOST_IP}:53:53/udp
      - ${HOST_IP}:53:53/tcp
      - ${HOST_IP}:${PI_HOLE_WEB_ADMIN_PORT}:80/tcp
    environment:
      TZ: Europe/Berlin
      WEBPASSWORD_FILE: pi_hole_webpw
      FTLCONF_dns_upstreams: 'dns-proxy#53'
      FTLCONF_dns_listeningMode: 'ALL' # Otherwise DNS requests outside of this docker-compose network are ignored
    volumes:
      - pihole-data:/etc/pihole/
      - ./data/log/:/var/log/pihole/
    depends_on:
      - dns-proxy
    secrets:
      - pi_hole_webpw
volumes:
  pihole-data:
secrets:
  pi_hole_webpw:
    file: ./pi-hole-webpw.secret
